<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TK教培视频拆解工具</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --accent: #7c6bff;
    --accent2: #ff6b9d;
    --accent3: #6bffd4;
    --text: #f0f0f8;
    --text2: #8888aa;
    --text3: #5555775;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: linear-gradient(rgba(124,107,255,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(124,107,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    margin-bottom: 40px;
    display: flex;
    align-items: flex-end;
    gap: 16px;
  }

  .header-left { flex: 1; }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(124,107,255,.3);
    padding: 4px 10px;
    border-radius: 99px;
    margin-bottom: 12px;
    background: rgba(124,107,255,.08);
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    line-height: 1.1;
    color: var(--text);
    letter-spacing: -.02em;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 14px;
    color: var(--text2);
    margin-top: 8px;
    line-height: 1.6;
  }

  .counter-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    text-align: center;
    flex-shrink: 0;
  }

  .counter-num {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--accent);
  }

  .counter-lbl {
    font-size: 11px;
    color: var(--text2);
    margin-top: 2px;
  }

  /* Input area */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
  }

  .input-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    padding: 14px 16px;
    resize: vertical;
    min-height: 120px;
    outline: none;
    transition: border-color .2s;
  }

  textarea::placeholder { color: var(--text2); opacity: .6; }
  textarea:focus { border-color: var(--accent); }

  .btn-analyze {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px 20px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: all .2s;
    letter-spacing: .02em;
    flex-shrink: 0;
  }

  .btn-analyze:hover { background: #6a59ee; transform: translateY(-1px); }
  .btn-analyze:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  .btn-analyze .icon { display: block; font-size: 20px; margin-bottom: 4px; text-align: center; }

  /* Loading */
  .loading {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    background: rgba(124,107,255,.08);
    border: 1px solid rgba(124,107,255,.2);
    border-radius: 10px;
    margin-top: 12px;
    font-size: 13px;
    color: var(--accent);
  }

  .loading.show { display: flex; }

  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(124,107,255,.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results list */
  .results { display: flex; flex-direction: column; gap: 20px; }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    animation: slideUp .4s ease both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }

  .result-num {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: var(--accent);
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .result-title {
    flex: 1;
    font-size: 13px;
    color: var(--text2);
    line-height: 1.4;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .result-toggle {
    color: var(--text2);
    font-size: 18px;
    transition: transform .2s;
    flex-shrink: 0;
  }

  .result-toggle.open { transform: rotate(180deg); }

  .result-body {
    display: none;
    padding: 20px;
  }

  .result-body.open { display: block; }

  /* Dimensions grid */
  .dim-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  .dim-item {
    background: var(--surface2);
    border-radius: 10px;
    padding: 12px 14px;
    border-left: 3px solid;
  }

  .dim-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 6px;
    opacity: .8;
  }

  .dim-content {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
  }

  /* Summary section */
  .summary-section {
    border-top: 1px solid var(--border);
    padding-top: 16px;
    margin-top: 4px;
  }

  .summary-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 8px;
    letter-spacing: .02em;
  }

  .summary-content {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.7;
    white-space: pre-wrap;
  }

  /* Formula box */
  .formula-box {
    background: rgba(107,255,212,.06);
    border: 1px solid rgba(107,255,212,.2);
    border-radius: 10px;
    padding: 12px 14px;
    margin-top: 12px;
  }

  .formula-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--accent3);
    margin-bottom: 6px;
  }

  .formula-content {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
  }

  /* Export bar */
  .export-bar {
    display: none;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    margin-top: 24px;
  }

  .export-bar.show { display: flex; }

  .export-info { font-size: 13px; color: var(--text2); }
  .export-info strong { color: var(--text); }

  .btn-export {
    background: transparent;
    color: var(--accent3);
    border: 1px solid rgba(107,255,212,.3);
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
  }

  .btn-export:hover { background: rgba(107,255,212,.08); }

  /* Dim colors */
  .d1 { border-color: #7c6bff; }
  .d1 .dim-label { color: #7c6bff; }
  .d2 { border-color: #ff6b9d; }
  .d2 .dim-label { color: #ff6b9d; }
  .d3 { border-color: #ffd56b; }
  .d3 .dim-label { color: #ffd56b; }
  .d4 { border-color: #6bffd4; }
  .d4 .dim-label { color: #6bffd4; }
  .d5 { border-color: #ff9d6b; }
  .d5 .dim-label { color: #ff9d6b; }
  .d6 { border-color: #c46bff; }
  .d6 .dim-label { color: #c46bff; }
  .d7 { border-color: #6bb8ff; }
  .d7 .dim-label { color: #6bb8ff; }
  .d8 { border-color: #ff6b6b; }
  .d8 .dim-label { color: #ff6b6b; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text2);
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: .4; }
  .empty-text { font-size: 14px; line-height: 1.6; }

  /* Error */
  .error-msg {
    background: rgba(255,107,107,.08);
    border: 1px solid rgba(255,107,107,.2);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: #ff9d9d;
    margin-top: 12px;
    display: none;
  }

  .error-msg.show { display: block; }

  @media (max-width: 600px) {
    .dim-grid { grid-template-columns: 1fr; }
    .input-row { flex-direction: column; }
    .btn-analyze { width: 100%; }
    h1 { font-size: 24px; }
    .header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-left">
      <div class="badge">TK 教培内容分析</div>
      <h1>视频拆解<span>工具</span></h1>
      <p class="subtitle">粘贴视频标题 + 文案，AI 按 8 个维度自动拆解<br>支持批量输入，一条一条积累拆解库</p>
    </div>
    <div class="counter-badge">
      <div class="counter-num" id="totalCount">0</div>
      <div class="counter-lbl">已拆解条数</div>
    </div>
  </div>

  <div class="input-card">
    <div class="input-label">粘贴视频内容</div>
    <div class="input-row">
      <textarea id="videoInput" placeholder="粘贴视频标题 + 正文文案（可以只粘贴标题，或者把评论区高赞内容也加进来，分析会更准）"></textarea>
      <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">
        <span class="icon">⚡</span>
        开始拆解
      </button>
    </div>
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span id="loadingText">AI 正在从 8 个维度拆解这条视频...</span>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="results" id="results">
    <div class="empty">
      <div class="empty-icon">📊</div>
      <div class="empty-text">还没有拆解记录<br>把第一条视频文案粘贴进去开始吧</div>
    </div>
  </div>

  <div class="export-bar" id="exportBar">
    <div class="export-info">已积累 <strong id="exportCount">0</strong> 条拆解，可导出为文本</div>
    <button class="btn-export" onclick="exportAll()">导出全部 →</button>
  </div>

</div>

<script>
  const results = [];

  const dimConfig = [
    { key: 'persona',   label: '1. 人设定位', cls: 'd1' },
    { key: 'audience',  label: '2. 目标用户', cls: 'd2' },
    { key: 'title',     label: '3. 标题结构', cls: 'd3' },
    { key: 'hook',      label: '4. 开头钩子', cls: 'd4' },
    { key: 'structure', label: '5. 内容框架', cls: 'd5' },
    { key: 'emotion',   label: '6. 情绪点',   cls: 'd6' },
    { key: 'cta',       label: '7. 转化设计', cls: 'd7' },
    { key: 'formula',   label: '8. 可复用公式', cls: 'd8' },
  ];

  async function analyze() {
    const input = document.getElementById('videoInput').value.trim();
    if (!input) return;

    const btn = document.getElementById('analyzeBtn');
    const loading = document.getElementById('loading');
    const errorMsg = document.getElementById('errorMsg');

    btn.disabled = true;
    loading.classList.add('show');
    errorMsg.classList.remove('show');

    const loadingTexts = [
      'AI 正在从 8 个维度拆解这条视频...',
      '分析人设定位与目标用户...',
      '拆解内容框架与情绪设计...',
      '提炼可复用公式...',
    ];
    let li = 0;
    const lt = setInterval(() => {
      li = (li + 1) % loadingTexts.length;
      document.getElementById('loadingText').textContent = loadingTexts[li];
    }, 2000);

    try {
      const prompt = `你是一位资深短视频运营专家，专注于TikTok教培类内容分析。

请从以下8个维度拆解这条视频，每个维度用2-4句话精准分析，不要废话：

视频内容：
${input}

请严格按以下JSON格式输出，不要有任何其他内容：
{
  "persona": "人设定位分析",
  "audience": "目标用户分析",
  "title": "标题结构分析",
  "hook": "开头钩子分析",
  "structure": "内容框架分析",
  "emotion": "情绪点分析",
  "cta": "转化设计分析",
  "formula": "可复用公式提炼",
  "why_viral": "这条视频为什么会爆？2-3句核心原因",
  "optimization": "如果重做一次应该如何优化？2-3条具体建议"
}`;

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await res.json();
      const text = data.content.map(i => i.text || '').join('');
      const clean = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      clearInterval(lt);
      loading.classList.remove('show');
      btn.disabled = false;

      // Add to results
      const item = { input: input.slice(0, 80) + (input.length > 80 ? '...' : ''), data: parsed };
      results.unshift(item);
      renderResults();

      document.getElementById('videoInput').value = '';
      document.getElementById('totalCount').textContent = results.length;

    } catch (e) {
      clearInterval(lt);
      loading.classList.remove('show');
      btn.disabled = false;
      errorMsg.textContent = '分析失败，请检查内容后重试：' + e.message;
      errorMsg.classList.add('show');
    }
  }

  function renderResults() {
    const container = document.getElementById('results');
    const exportBar = document.getElementById('exportBar');

    if (results.length === 0) {
      container.innerHTML = `<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">还没有拆解记录<br>把第一条视频文案粘贴进去开始吧</div></div>`;
      exportBar.classList.remove('show');
      return;
    }

    exportBar.classList.add('show');
    document.getElementById('exportCount').textContent = results.length;

    container.innerHTML = results.map((item, i) => {
      const num = results.length - i;
      const d = item.data;
      return `
        <div class="result-card">
          <div class="result-header" onclick="toggleCard(${i})">
            <div class="result-num">${num}</div>
            <div class="result-title">${escHtml(item.input)}</div>
            <div class="result-toggle" id="toggle-${i}">▾</div>
          </div>
          <div class="result-body" id="body-${i}">
            <div class="dim-grid">
              ${dimConfig.map(dim => `
                <div class="dim-item ${dim.cls}">
                  <div class="dim-label">${dim.label}</div>
                  <div class="dim-content">${escHtml(d[dim.key] || '-')}</div>
                </div>
              `).join('')}
            </div>
            <div class="summary-section">
              <div class="summary-title">💥 为什么会爆？</div>
              <div class="summary-content">${escHtml(d.why_viral || '-')}</div>
              <div class="formula-box" style="margin-top:12px">
                <div class="formula-label">🔁 重做优化建议</div>
                <div class="formula-content">${escHtml(d.optimization || '-')}</div>
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function toggleCard(i) {
    const body = document.getElementById(`body-${i}`);
    const toggle = document.getElementById(`toggle-${i}`);
    body.classList.toggle('open');
    toggle.classList.toggle('open');
  }

  function exportAll() {
    const lines = results.map((item, i) => {
      const num = results.length - i;
      const d = item.data;
      return [
        `========== 第 ${num} 条 ==========`,
        `内容：${item.input}`,
        ``,
        `1. 人设定位：${d.persona}`,
        `2. 目标用户：${d.audience}`,
        `3. 标题结构：${d.title}`,
        `4. 开头钩子：${d.hook}`,
        `5. 内容框架：${d.structure}`,
        `6. 情绪点：${d.emotion}`,
        `7. 转化设计：${d.cta}`,
        `8. 可复用公式：${d.formula}`,
        ``,
        `为什么会爆：${d.why_viral}`,
        `重做优化：${d.optimization}`,
        ``,
      ].join('\n');
    }).join('\n');

    const blob = new Blob([lines], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `TK教培视频拆解库_${new Date().toLocaleDateString('zh-CN').replace(/\//g, '-')}.txt`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Enter to submit (Ctrl+Enter)
  document.getElementById('videoInput').addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'Enter') analyze();
  });
</script>
</body>
</html>
